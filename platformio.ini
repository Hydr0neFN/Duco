; ─────────────────────────────────────────────────────────────────────────────
; Duco RF Gateway + Power Monitor  —  Wemos D1 Mini (ESP8266)
; ─────────────────────────────────────────────────────────────────────────────
[common]
platform = espressif8266
board = d1_mini
framework = arduino
monitor_speed = 115200
board_build.f_cpu = 160000000L
lib_deps =
    knolleary/PubSubClient @ ^2.8
    https://github.com/avishorp/TM1637.git
build_flags =
    -D PIO_FRAMEWORK_ARDUINO_LWIP2_LOW_MEMORY

; ─────────────────────────────────────────────────────────────────────────────
; DucoCC1101 library — files live in lib/DucoCC1101/ (auto-discovered by PIO)
; Source: https://github.com/arnemauer/Ducobox-ESPEasy-Plugin  →  lib/Duco/
; ─────────────────────────────────────────────────────────────────────────────

; USB / first flash
[env:d1_mini]
extends = common
upload_speed = 921600

; OTA reflash  →  pio run -e d1_mini_ota -t upload
[env:d1_mini_ota]
extends = common
upload_protocol = espota
upload_port = 10.0.0.119
upload_flags =
    ; Replace with your OTA password (must match OTA_PASSWORD in secrets.h).
    ; Kept out of git so the real password is not published.
    --auth=YOUR_OTA_PASSWORD
